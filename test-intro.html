<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PkLavc - Intro GTA Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background: #000;
            color: white;
            overflow-x: hidden;
        }

        /* Hero section que permite scroll */
        #hero-section {
            position: relative;
            height: 300vh; /* Altura tripla para permitir o efeito completo */
            background: #000;
        }

        /* Container fixo */
        .hero-container {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        /* Imagem da personagem - início visível, depois sobe */
        .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: url('images/Skyler.gif') center center / cover no-repeat;
            z-index: 1;
            transition: transform 0.05s ease-out;
        }

        /* Texto gigante que começa escondido e vai aparecendo */
        .hero-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
            opacity: 0; /* Começa invisível */
            transition: opacity 0.3s ease;
        }

        .title {
            font-size: 22vw;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            line-height: 0.9;
            text-align: center;
            
            /* Texto vazado */
            color: transparent;
            -webkit-text-stroke: 4px rgba(255, 255, 255, 0.9);
            text-stroke: 4px rgba(255, 255, 255, 0.9);
            
            text-shadow: 
                0 0 30px rgba(199, 0, 57, 0.4),
                0 0 60px rgba(199, 0, 57, 0.2);
        }

        .subtitle {
            font-size: 4vw;
            font-weight: 300;
            text-align: center;
            margin-top: 10px;
            color: transparent;
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.7);
            text-stroke: 1.5px rgba(255, 255, 255, 0.7);
        }

        /* Indicador de scroll */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            animation: bounce 2s infinite;
        }

        .scroll-indicator p {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            opacity: 0.7;
        }

        .scroll-arrow {
            width: 30px;
            height: 50px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 25px;
            margin: 0 auto;
            position: relative;
        }

        .scroll-arrow::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: scrollDot 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        @keyframes scrollDot {
            0% { top: 10px; opacity: 1; }
            100% { top: 30px; opacity: 0; }
        }

        /* Conteúdo após intro */
        #content-section {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 100px 50px;
            position: relative;
            z-index: 10;
        }

        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            opacity: 0;
            animation: fadeIn 1s ease forwards;
        }

        h2 {
            font-size: 48px;
            margin-bottom: 30px;
            color: #c70039;
        }

        p {
            font-size: 18px;
            line-height: 1.8;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .title {
                font-size: 28vw;
                -webkit-text-stroke: 3px rgba(255, 255, 255, 0.9);
            }
            .subtitle {
                font-size: 6vw;
            }
        }
    </style>
</head>
<body>
    <section id="hero-section">
        <div class="hero-container">
            <!-- Imagem -->
            <div class="hero-image" id="heroImage"></div>
            
            <!-- Texto que vai aparecer -->
            <div class="hero-text" id="heroText">
                <div class="title">PkLavc</div>
                <div class="subtitle">Software Engineer</div>
            </div>

            <!-- Indicador de scroll -->
            <div class="scroll-indicator" id="scrollIndicator">
                <p>Scroll Down</p>
                <div class="scroll-arrow"></div>
            </div>
        </div>
    </section>

    <section id="content-section">
        <div class="content-wrapper">
            <h2>Bem-vindo</h2>
            <p>
                Efeito inspirado no GTA 6: primeiro você vê apenas a imagem,
                depois ao rolar, o texto gigante vai aparecendo, e a imagem
                desaparece "por trás" das letras transparentes.
            </p>
            <p>
                Continue explorando o conteúdo...
            </p>
        </div>
    </section>

    <script>
        window.addEventListener('scroll', function() {
            const scrolled = window.pageYOffset;
            const heroSection = document.getElementById('hero-section');
            const heroImage = document.getElementById('heroImage');
            const heroText = document.getElementById('heroText');
            const scrollIndicator = document.getElementById('scrollIndicator');
            const sectionHeight = heroSection.offsetHeight;
            
            // Fase 1: 0-30% do scroll - texto começa a aparecer
            if (scrolled < sectionHeight * 0.3) {
                const fadeProgress = scrolled / (sectionHeight * 0.3);
                heroText.style.opacity = fadeProgress;
                scrollIndicator.style.opacity = 1 - fadeProgress;
            }
            // Fase 2: 30-100% - texto visível, imagem sobe
            else if (scrolled < sectionHeight) {
                heroText.style.opacity = 1;
                scrollIndicator.style.opacity = 0;
                
                // Move imagem para cima (efeito parallax)
                const moveProgress = (scrolled - sectionHeight * 0.3) / (sectionHeight * 0.7);
                heroImage.style.transform = `translateY(-${moveProgress * 100}vh)`;
            }
        });
    </script>
</body>
</html>
